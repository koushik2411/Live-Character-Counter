<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="box">

        <h2>Live Character Counter</h2>

        <textarea id="textBox" maxlength="150" required placeholder="Type your message..." rows="7"></textarea>

        <div id="info">
            Number of characters: <span id="charCount">0</span> / 150
        </div>
        
        <input type="submit" id="submitBtn">

    </div>

    <script src="script.js"></script>
    
</body>
</html>
